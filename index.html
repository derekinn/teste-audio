<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player de Vídeo com Mux</title>
    <!-- Adicione o Mux Player -->
    <script src="https://cdn.mux.com/player.js"></script>
</head>
<body>
    <h1>Player de Vídeo</h1>
    <!-- Adicione o Player do Mux -->
    <div id="mux-player"></div>
    <script>
        const player = Mux.Player.create({
            id: 'mux-player',
            url: 'URL_DO_VIDEO_AQUI', 
            width: 1280,  // 1280 pra 720p ou 1920 para 1080p
            height: 720,  // 720 pra 720p ou 1080 para 1080p
            autoplay: false,
            muted: false,
            controls: true,
        });
    </script>
</body>
</html>
